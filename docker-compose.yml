version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  # NEW: Ngrok container to expose the frontend
  ngrok:
    image: ngrok/ngrok:latest
    ports:
      - "4040:4040" # Ngrok local dashboard (optional)
    environment:
      # We pass your auth token via environment variable
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    # Tell ngrok to point an HTTP tunnel to the 'frontend' service on port 5173
    command: "http frontend:5173"
    depends_on:
      - frontend
